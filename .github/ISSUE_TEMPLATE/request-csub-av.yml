name: Request a CSUB-AV repo
description: Get your personal repo for a CSUB-AV assignment. Register first if you have not.
title: "request-csub-av: "
body:
  - type: markdown
    attributes:
      value: |
        ### Request your CSUB-AV assignment repo
        Pick the assignment. Your GitHub username is captured automatically.
        Not registered yet? Open the **Register** form first.
  - type: dropdown
    id: assignment
    attributes:
      label: Assignment
      description: (Auto-generated from config.json — do not hand-edit.)
      options:
        - Day1
        - Day2
        - Day3
        - Day4
        - Day5
    validations:
      required: true
